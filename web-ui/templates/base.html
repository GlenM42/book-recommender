<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Book Recommender{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-flex; }
    .htmx-request.htmx-indicator { display: inline-flex; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
  <header class="bg-white shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center gap-3">
      <span class="text-2xl font-bold tracking-tight">Book Recommender</span>
      <span class="htmx-indicator items-center gap-2 text-sm text-gray-500" id="global-spinner">
        <svg class="animate-spin h-4 w-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        Loading...
      </span>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 flex-1 w-full">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-gray-200 bg-white mt-auto">
    <div class="max-w-5xl mx-auto px-4 py-4 text-sm text-gray-400 text-center">
      Made by <a href="https://github.com/GlenM42">GlenM42</a>, 2026
    </div>
  </footer>
</body>
</html>
