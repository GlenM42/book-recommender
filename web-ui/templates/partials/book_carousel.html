<section class="mb-6">
  <h2 class="text-lg font-semibold mb-3 text-gray-800">{{ heading }}</h2>

  {% if books %}
  <div
    class="flex gap-4 overflow-x-auto pb-4"
    style="scroll-snap-type: x mandatory;"
  >
    {% for book in books %}
    <div
      class="flex-none w-44 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col p-3 gap-2"
      style="scroll-snap-align: start;"
    >
      <p class="text-sm font-medium leading-snug line-clamp-3 text-gray-900">
        {{ book.title }}
      </p>
      <p class="text-xs text-gray-400">
        work_id: {{ book.work_id }} <br>
        {{ book.stat_label }}: {{ book.stat_value }}
      </p>
      <button
        hx-post="/recommend"
        hx-vals='{"work_id": "{{ book.work_id }}"}'
        hx-target="#recommendation-carousels"
        hx-swap="beforeend"
        hx-indicator="#global-spinner"
        class="mt-1 w-full bg-blue-900 hover:bg-blue-800 text-white text-xs font-medium py-1.5 px-2 rounded-lg transition-colors"
      >
        Get Matrix Factorization Recommendation
      </button>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p class="text-sm text-gray-500">No results found.</p>
  {% endif %}
</section>
